<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captcha Verification</title>

<style>
:root{
    --bg1:#4f8cff;
    --bg2:#7a5cff;
    --card:rgba(255,255,255,.75);
    --text:#111;
    --input:#ffffff;
    --border:rgba(0,0,0,.08);
}

@media (prefers-color-scheme: dark){
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(30,41,59,.7);
    --text:#fff;
    --input:#334155;
    --border:rgba(255,255,255,.08);
}
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ffffff22;
    border-radius:50%;
    top:-150px;
    right:-150px;
    filter:blur(80px);
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00c6ff22;
    border-radius:50%;
    bottom:-150px;
    left:-150px;
    filter:blur(70px);
}

.box{
    position:relative;
    width:340px;
    padding:35px;
    border-radius:24px;
    background:var(--card);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    box-shadow:0 20px 50px rgba(0,0,0,.18);
    text-align:center;
    color:var(--text);
    animation:pop .45s ease;
}

@keyframes pop{
from{
transform:scale(.9);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.icon{
    font-size:55px;
    margin-bottom:10px;
}

h2{
    margin-bottom:8px;
}

p{
    opacity:.8;
}

.question{
    font-size:22px;
    font-weight:bold;
    margin:20px 0;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--input);
    color:var(--text);
    outline:none;
    font-size:17px;
    text-align:center;
}

button{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4f8cff,#675dff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(79,140,255,.4);
}

button:active{
    transform:scale(.98);
}

#result{
    margin-top:14px;
    min-height:22px;
    color:#ff4d4d;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<div class="icon">🤖</div>

<h2>CAPTCHA Verification</h2>

<p>Please solve the math question.</p>

<div class="question" id="question"></div>

<input type="number" id="answer" placeholder="Your answer">

<button onclick="verify()">Verify</button>

<div id="result"></div>

</div>

<script>

let n1=Math.floor(Math.random()*10)+1;
let n2=Math.floor(Math.random()*10)+1;

let correct=n1+n2;

document.getElementById("question").innerHTML=`${n1} + ${n2} = ?`;

function verify(){

const user=Number(document.getElementById("answer").value);

if(user===correct){

document.getElementById("result").style.color="#22c55e";
document.getElementById("result").innerHTML="✔ Verification successful!";

setTimeout(()=>{
window.location.href="index.html";
},700);

}else{

document.getElementById("result").style.color="#ef4444";
document.getElementById("result").innerHTML="❌ Incorrect answer. Try again.";

document.getElementById("answer").value="";

}

}

</script>

</body>
</html>
